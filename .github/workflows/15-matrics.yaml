name: 15 matrics
on: workflow_dispatch
jobs:
    
    backwards-compatability:
        runs-on: ${{matrix.os}}
        name: ${{matrix.os}}-${{matrix.node-version}}
        strategy: 
            fail-fast: true
            matrix: 
                node-version: [19.x,20.x,21.x]
                os:
                  - ubuntu-latest
                  - windows-latest
                include:
                    - os: ubuntu-latest
                      node-version: '22.x'
                    - os: ubuntu-latest
                      node-version: '21.x'
                      tag: experimental
       
        steps:
            - name: setup-node
              uses: actions/setup-node@v3
              with: 
                 node-version: ${{matrix.node-version}}

            - name: fail if experimental
              if: ${{matrix.tag == 'experimental'}}
              run: exit 1
            - name: Perform tasks
              run: |
                sleep 10
                echo "Running tests on OS ${{matrix.os}} and NodeJS ${{matrix.node-version}}"
            - name: upload test results
              run: echo "Upload test results"
             
    include-example: 
      runs-on: ubuntu-latest
      name: ${{matrix.color}}-${{matrix.shapes}}-${{matrix.size}}-${{matrix.opacity}}
      strategy: 
        matrix: 
          color: 
            - red
            - blue
            - green
          shapes:
            - circle
            - square
          size: 
            - small 
            - large
          include:
              - color: red
                opacity: 75
              - shapes: circle
                opacity: 100
              - color: red
                shapes: triangle
              - opacity: 50
          exclude:
            - opacity: 75
      steps:
          - name: Dummy Step
            run: echo "Color ${{matrix.color}} shapes ${{matrix.shapes}} size ${{matrix.size}} opacity ${{matrix.opacity}}"
