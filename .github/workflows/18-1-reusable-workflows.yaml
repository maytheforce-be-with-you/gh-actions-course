name: 18 1 Reusable workflows - Defination
on: 
  workflow_call:
    inputs:  
      target_directory:
        type: string
        required: true

    outputs:             
        build-status:
              description: status of build process
              value: ${{jobs.deploy.outputs.build-status}}
        url: 
          description: status of url
          value: ${{jobs.deploy.outputs.url}}
jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{steps.build.outputs.build-status}}
      url: ${{steps.deploy.outputs.url}}
    steps:
      - name: check out the repo
        uses: actions/checkout@v4

      - name: Build 
        id: build
        run: |
          echo "Build using directory ${{inputs.target_directory}}"
          echo "build-status=success" >> "GITHUB_OUTPUT"

      - name: Deploy
        id: deploy
        run: | 
          echo "deploying artifacts"
          echo "url=https://www.google.com" >> "GITHUB_OUTPUT"