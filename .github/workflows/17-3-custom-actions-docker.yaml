name: 17-3 custom actions docker
on: 
    workflow_dispatch:
      inputs:
        url:
         type: string
         default: 'https://www.google.com'
        max_trails:
         description: max no of trials until the action fails.
         default: '10'
         required: false 
        delay:
          description: delay in seconds between trials
          default: '5'
          required: false
        
jobs:
    ping-url:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
        - name: Ping url
          uses: ./.github/actions/docker-ping-url
          with: 
            url: ${{inputs.url}}
            delay: ${{inputs.delay}}
            max_trails: ${{inputs.max_trails}}
            