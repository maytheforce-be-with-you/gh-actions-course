name: 09 functions 
on:
  pull_request:
  workflow_dispatch:

jobs: 
   echo1:
    runs-on: ubuntu-latest
    steps:
        - name: get data
          run: echo "${{github.event.pull_request.title}}"
        - name: print PR labels
          run: |
           cat << EOF
            ${{ toJSON(github.pull_request.labels)}}
            EOF
        - name: bug step
          if: ${{ !cancelled() && contains(github.event.pull_request.title, 'fix')}}
          run: echo "I am a fix"
        - name: Failing step
          run: exit 1
        - name: I will be skipped
          if: ${{ success() }}
          run: echo "I will print if prev step is success"
        - name: I will execute
          if: ${{failure()}}
          run: echo "i will print if any prev step fails"
        - name: I will execute
          if: ${{ !cancelled()}}
          run: echo " I will always print except when workflow is cancelled"
        - name: I will execute when cancelled
          if: ${{ cancelled()}}
          run: echo "I will print if the workflow is cancelled"
