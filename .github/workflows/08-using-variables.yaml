name: 08 using variables
on: 
    workflow_dispatch:
env:
    WORKFLOW_VAR: "I am a workflow env var"
    OVERWRITTEN: "I will be overwritten"
jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: "I am a job env var"
      OVERWRITTEN: "I have been overwritten at the job level"

    steps:
      - name: print env var 
        env: 
          STEP_VAR: "I am a step env var"
          step_var2: "I am another step var"
        run: |
           echo "Step env var: <retrieve the value of STEP_VAR here> $${{env.STEP_VAR}}"

           echo "Step env var 2: <retrieve the value of step_var2 here> ${{env.step_var2}}"

           echo "Job env var: <retrieve the value of JOB_VAR here> ${{env.JOB_VAR}}"

           echo "Workflow env var: <retrieve the value of WORKFLOW_VAR here> ${{env.WORKFLOW_VAR}}"

            echo "Overwritten: <retrieve the value of OVERWRITTEN here> ${{env.OVERWRITTEN}}"

      - name: Overwritten job variable
        env: 
          OVERWRITTEN: "I have been overwritten at the step level"
        run: |
            echo "Step env var: <retrieve the value of OVERWRITTEN here> ${{env.OVERWRITTEN}}"