name: 11 inputs 

on: 
    workflow_dispatch:
        inputs:
            dry-run:
                type: boolean
                description: Skip deployment and only print build output
                default: false
            target:
                type: environment
                required: true
                description: Which environment the workflow will target
            tag: 
                type: choice
                options:
                    - v1
                    - v2
                    - v3
                default: v3
                description: Release from which to build and deploy

jobs:
    build:
        runs-on: ubuntu-latest
        steps: 
            - name: Build
              run: echo " Building from tag <retrieve the value of the tag input here> ${{ inputs.tag}}"
    deploy:
        runs-on: ubuntu-latest
        needs: 
            - build
        if: ${{!inputs.dry-run}}
        steps: 
          - name: deploy
            run: echo "Deploying to <retrieve the value of the target input here> ${{inputs.target}}"
               

