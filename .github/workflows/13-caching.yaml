name: 13 using caching
on: 
    workflow_dispatch:
        inputs:
            use-cache:
                type: boolean
                default: true
                description: Whether to execute cache step
jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 13-caching/react-app
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: setup node
              uses: actions/setup-node@v3
              with: 
                node-version: '20.x'
            - name: install dependencies
              run: |
               npm install
            - name: Testing
              run: |
               npm run test
            - name: building
              run: | 
                npm run build
            - name: deploying to non-prod
              run: echo "deploy to non prod"
              



