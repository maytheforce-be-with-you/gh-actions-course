name: 16 working with environments
on:
  workflow_dispatch:
      inputs:
        tar-env:
            type:
                environment
            default: staging
run-name: 16 environment ${{inputs.tar-env}} 
jobs:
    deploy-staging:
        runs-on: ubuntu-latest
        environment: staging
        env: 
            my-env-value: ${{vars.MY_ENV_VALUE || 'defaultvalue' }}
        steps:
          - name: echo vars
            run: echo "staging ${{env.my-env-value}}"
    E2E tests:
        runs-on: ubuntu-latest
        environment: E2E Tests
        env: 
            my-env-value: ${{vars.MY_ENV_VALUE || 'defaultvalue' }}
        needs: staging
        steps:
          - name: echo vars
            run: echo "E2e TEsts ${{env.my-env-value}}
    deploy-prod:
        runs-on: ubuntu-latest
        environment: Prod
        env: 
            my-env-value: ${{vars.MY_ENV_VALUE || 'defaultvalue' }}
        needs: E2e tests
        steps:
          - name: echo vars
            run: echo "prod ${{env.my-env-value}}"
