name: cache node and NPM Dependencies
description: This action allows to cache both Node and NPM dependencies based on the package-lock.json file.
inputs:
  node-version:
    description: NodeJS version to use
    default: '20.x'
  working-directory:
    description: The working directory of the application
    default: .
runs:
  using: composite
  steps: 

      - name: setup node
        uses: actions/setup-node@v3
        with: 
          node-version: ${{inputs.node-version}}
      - name: cache-dependencies
        id: cache
        uses: actions/cache@v3
        with:
          path: ${{inputs.working-directory}}/node-modules
          key: node-modules-${{hashFiles(format( '{0}/{1}' , inputs.working-directory , '/package-lock.json'))}}
      - name:  install-dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
               npm install
        shell: bash
        working-directory: ${{inputs.working-directory}}


      
